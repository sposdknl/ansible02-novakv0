---
# Vytvoření dedikovaného API uživatele s vysokým oprávněním pro potřeby Grafany
- name: Create a new Zabbix user
  community.zabbix.zabbix_user:
    username: "{{ zabbix_api_user }}"
    passwd: "{{ zabbix_api_user_password }}"
    role_name: "Super admin role"
    usrgrps:
      - "Zabbix administrators"
    state: present
# Vytvoření nového uživatele - student
- name: Create student user Vojtech Novak
  community.zabbix.zabbix_user:
    username: "vojtech.novak"
    name: "Vojtěch"
    surname: "Novák"
    passwd: "Password123"
    role_name: "User role"
    usrgrps:
      - "Users"
    user_medias:
      - mediatype: "Email"
        sendto: "novak.vojtech@student.sposdk.cz"
        period: "1-7,00:00-24:00"
        severity:
          not_classified: false
          information: false
          warning: true
          average: true
          high: true
          disaster: true
        active: true
    state: present
